<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finalizar Compra</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand" href="index.html">
      AutoCar
    </a>

    <a href="index.html" class="btn btn-outline-light">
      Voltar ao Catálogo
    </a>

  </div>
</nav>

</header>

<main class="container my-5">

<h1 class="text-center mb-4">
  Finalização da Compra
</h1>

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-body">

<form action="obrigado.html" method="get">

<div class="mb-3">
<label class="form-label">Nome Completo</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">CPF</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">E-mail</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Telefone</label>
<input type="tel" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Veículo de Interesse</label>

<select class="form-select">
  <option>Chevrolet Camaro</option>
  <option>Porsche 911 Carrera</option>
  <option>BMW Série 3 M340i</option>
</select>

</div>

<div class="mb-3">
<label class="form-label">Forma de Pagamento</label>

<select class="form-select">
  <option>À Vista</option>
  <option>Financiamento</option>
  <option>Consórcio</option>
</select>

</div>

<div class="mb-3">
<label class="form-label">
Observações
</label>

<textarea class="form-control" rows="4"></textarea>

</div>

<div class="d-grid">

<button class="btn btn-success btn-lg">
Finalizar Solicitação
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</main>

<footer class="bg-dark text-white text-center p-3">

<p>
© 2026 AutoCar - Todos os direitos reservados.
</p>

</footer>

</body>
</html>
